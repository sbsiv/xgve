<!-- @dsCard group="Site" viewport="1280x860" name="XGVE Terminal — vaporwave ASCII" subtitle="CRT lockup: emblem + XGVE wordmark reconstructed from glyphs; artistic only" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XGVE.SYSTEMS</title>
<link rel="icon" href="../assets/web/xgve-favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --w:#e9eaec; --struct:#ffffff; --m:#7d828c; --d:#33363d;
    --red:#ff2233; --red-d:#a8121d; --ink:#83848c; --ink-dim:#565b64;
    --crt:.55;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Mono",ui-monospace,monospace;
    overflow:hidden; letter-spacing:.04em; -webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .jp{font-family:"Noto Sans JP",sans-serif; letter-spacing:.1em;}

  .screen{position:fixed; inset:0; overflow:hidden;
    background:radial-gradient(130% 110% at 50% 44%, #0c0c0f 0%, #000 66%);}
  .screen::before{content:""; position:absolute; inset:0; z-index:40; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,calc(.55*var(--crt))) 2px 3px);
    background-size:100% 3px; animation:scanmove 8s linear infinite; opacity:var(--crt);}
  .screen::after{content:""; position:absolute; inset:0; z-index:41; pointer-events:none;
    background:radial-gradient(120% 100% at 50% 46%, transparent 56%, rgba(0,0,0,.6) 100%);
    animation:flick 5.5s steps(60) infinite;}
  @keyframes scanmove{from{background-position:0 0;}to{background-position:0 60px;}}
  @keyframes flick{0%,100%{opacity:.94;}48%{opacity:1;}49%{opacity:.86;}50%{opacity:1;}}
  .scanband{position:absolute; left:0; right:0; height:120px; z-index:42; pointer-events:none;
    background:linear-gradient(to bottom, transparent, rgba(120,140,160,.05) 50%, transparent);
    animation:scanband 7.5s linear infinite;}
  @keyframes scanband{0%{top:-140px;}100%{top:100%;}}

  .cr{position:absolute; width:14px; height:14px; z-index:30; pointer-events:none;}
  .cr.tl{left:22px; top:22px; border-left:1px solid #43444a; border-top:1px solid #43444a;}
  .cr.tr{right:22px; top:22px; border-right:1px solid #43444a; border-top:1px solid #43444a;}
  .cr.bl{left:22px; bottom:22px; border-left:1px solid #43444a; border-bottom:1px solid #43444a;}
  .cr.br{right:22px; bottom:22px; border-right:1px solid #43444a; border-bottom:1px solid #43444a;}

  /* centre lockup: emblem + wordmark + vaporwave statement */
  .stage{position:absolute; inset:0; display:grid; place-items:center; z-index:10;}
  .lockup{display:flex; flex-direction:column; align-items:center; gap:0;}
  .asc{position:relative;}
  .asc pre{margin:0; position:absolute; inset:0; font-family:"IBM Plex Mono",monospace;
    letter-spacing:0; white-space:pre; pointer-events:none;}
  .asc .wl{
    background:linear-gradient(157deg,#ffffff 0%,#eef1f6 19%,#b2b8c4 45%,#eaedf2 57%,#9096a1 82%,#d4d8df 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
  }
  .asc .rl{color:var(--red); transform-origin:48% 45%;}
  #asc-wordmark{margin-top:6px;}

  .tagline{margin-top:40px; text-align:center;}
  .tbig{font-family:"Space Grotesk",sans-serif; font-weight:700; letter-spacing:-.01em;
    font-size:clamp(24px, 3.5vw, 46px); line-height:1; color:#fff; position:relative;
    text-shadow:-2px 0 rgba(0,200,255,.42), 2px 0 rgba(255,34,51,.5), 0 0 22px rgba(255,255,255,.16);
    animation:chroma 3.8s ease-in-out infinite;}
  .tbig .dot{color:var(--red); text-shadow:0 0 10px rgba(255,34,51,.7);}
  @keyframes chroma{
    0%,100%{text-shadow:-2px 0 rgba(0,200,255,.42), 2px 0 rgba(255,34,51,.5), 0 0 22px rgba(255,255,255,.16);}
    50%{text-shadow:-3.5px 0 rgba(0,200,255,.6), 3.5px 0 rgba(255,34,51,.68), 0 0 30px rgba(255,255,255,.24);}
  }
  .tsub{margin-top:12px; color:var(--ink-dim); font-size:clamp(11px,1.1vw,14px); letter-spacing:.22em;}

  /* HUD */
  .hud{position:absolute; z-index:20; font-size:11px; line-height:1.7; text-transform:uppercase; letter-spacing:.1em; color:var(--ink);}
  .hud .dim{color:var(--ink-dim);}
  .hud .red{color:var(--red);}
  .hud .jp{color:var(--ink-dim); text-transform:none; font-size:12px;}
  .rule{height:1px; background:linear-gradient(to right,var(--ink-dim),transparent); margin:10px 0; width:150px;}
  .rule.r{background:linear-gradient(to left,var(--ink-dim),transparent); margin-left:auto;}

  .tl{top:44px; left:52px;}
  .brandmark{font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:26px; letter-spacing:.02em; color:#fff; line-height:1;}

  .tr{top:48px; right:52px; text-align:right;}
  .tr .kv{display:grid; grid-template-columns:auto auto; gap:0 12px; justify-content:end;}
  .tr .kv .k{color:var(--ink-dim);}
  .worklink{display:inline-block; margin-bottom:12px; font-weight:600; letter-spacing:.2em; color:var(--w); cursor:pointer; position:relative;}
  .worklink::after{content:""; position:absolute; left:0; right:100%; bottom:-4px; height:1.5px; background:var(--red); transition:right .3s ease;}
  .worklink:hover::after{right:0;}

  .bl{bottom:48px; left:52px; font-size:10.5px;}
  .bl .folder{width:16px; height:12px; border:1px solid var(--ink-dim); border-top-width:3px; margin-bottom:9px;}
  .bl .brand{color:var(--w); font-weight:500; letter-spacing:.14em;}

  .br{bottom:48px; right:52px; text-align:right;}
  .panel{display:grid; grid-template-columns:auto auto; gap:2px 24px; justify-content:end; border:1px solid #26262a; padding:13px 16px; font-size:10px;}
  .panel .k{color:var(--ink-dim); text-align:left;}
  .panel .v{color:var(--ink);}

  .blink{animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}

  .work{position:absolute; inset:0; z-index:60; display:none; place-items:center; background:rgba(0,0,0,.82); backdrop-filter:blur(2px);}
  .work.open{display:grid;}
  .work .box{border:1px solid #24282f; background:#050506; padding:26px 30px; min-width:min(520px,86vw);}
  .work .box h2{margin:0 0 4px; font-size:13px; letter-spacing:.2em; color:var(--w); text-transform:uppercase;}
  .work .box .sub{color:var(--ink-dim); font-size:12px; letter-spacing:.12em; margin-bottom:16px;}
  .work .item{display:grid; grid-template-columns:34px 1fr auto; gap:0 16px; align-items:baseline; padding:12px 0; border-top:1px solid #16191e; font-size:14px;}
  .work .item .idx{color:var(--red); font-size:11px;}
  .work .item .nm{color:var(--w); letter-spacing:.06em; font-family:"Space Grotesk",sans-serif; font-weight:600;}
  .work .item .ty{color:var(--ink-dim); font-size:11px; text-transform:uppercase; letter-spacing:.12em;}
  .work .close{margin-top:18px; font-size:11px; letter-spacing:.16em; color:var(--ink-dim); cursor:pointer; text-transform:uppercase;}
  .work .close:hover{color:var(--red);}

  @media (prefers-reduced-motion:reduce){ .scanband{display:none;} }
</style>
</head>
<body>
<div class="screen">
  <div class="cr tl"></div><div class="cr tr"></div><div class="cr bl"></div><div class="cr br"></div>

  <div class="stage">
    <div class="lockup">
      <div class="asc" id="asc-emblem" data-ascii="emblem" data-pattern="radial" data-font="9.5" data-dur="3800"></div>
      <div class="asc" id="asc-wordmark" data-ascii="wordmark" data-pattern="columns" data-font="5.4" data-dur="3000" data-red-max="0.4"></div>
      <div class="tagline">
        <div class="tbig">Good taste, engineered<span class="dot">.</span></div>
      </div>
    </div>
  </div>

  <div class="hud tl"><div class="brandmark">XGVE</div></div>

  <div class="hud tr">
    <a class="worklink" id="workBtn">WORK &rarr;</a>
    <div class="kv">
      <span class="k">BUILD:</span><span>95.04.27</span>
      <span class="k">USER:</span><span>GUEST</span>
      <span class="k">MODE:</span><span>RENDER</span>
    </div>
    <div class="rule r"></div>
    <div class="red">GLYPH MATRIX</div>
  </div>

  <div class="hud bl">
    <div class="folder"></div>
    <div class="brand">XGVE STUDIO&trade;</div>
    <div class="dim">&copy; 1995&ndash;2026 &middot; ALL RIGHTS RESERVED</div>
  </div>


  <div class="work" id="workOverlay">
    <div class="box">
      <h2>Selected Work</h2>
      <div class="sub">// 01</div>
      <div class="item"><span class="idx">01</span><span class="nm">Foxglove Multiversal</span><span class="ty">Game &middot; In development</span></div>
      <div class="close" id="workClose">[ CLOSE &times; ]</div>
    </div>
  </div>

  <div class="scanband"></div>
</div>

<script src="ascii-data.js"></script>
<script>
(function(){
  var NOISE = ['#','@','8','0','%','&','?','7','1','$','X','B','H',':','.','*','=','+','o','w'];
  var DATA = window.XG_ASCII || null;
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var mounts = [];

  function initAscii(el){
    var key=el.dataset.ascii, grid=DATA && DATA[key];
    if(!grid){ el.textContent='[ '+key+' missing ]'; return; }
    var fs=parseFloat(el.dataset.font||'10'), pat=el.dataset.pattern||'radial',
        dur=parseInt(el.dataset.dur||'3600',10),
        redMax=(el.dataset.redMax!=null?parseFloat(el.dataset.redMax):1);
    var lh=fs*1.15, cw=fs*0.6, C=grid.cols, R=grid.rows;
    el.style.width=(C*cw)+'px'; el.style.height=(R*lh)+'px';
    function mk(cls, glow){ var p=document.createElement('pre'); p.className=cls;
      p.style.cssText='font-size:'+fs+'px;line-height:'+lh+'px;text-shadow:'+glow+';'; return p; }
    var white=mk('wl','0 0 '+(fs*0.5)+'px rgba(255,255,255,.22)');
    var red=mk('rl','0 0 '+(fs*0.9)+'px rgba(255,34,51,.5)');
    el.appendChild(white); el.appendChild(red);
    var th=new Float32Array(C*R), cx=C/2, cy=R/2, maxr=Math.hypot(cx,cy);
    for(var y=0;y<R;y++)for(var x=0;x<C;x++){
      var t;
      if(pat==='radial') t=Math.hypot(x-cx,y-cy)/maxr;
      else if(pat==='columns') t=x/C;
      else if(pat==='bottom') t=1-(y/R);
      else if(pat==='top') t=y/R;
      else t=Math.random();
      t=t*0.80+Math.random()*0.20; th[y*C+x]=Math.min(0.999,t);
    }
    var o={grid:grid, white:white, red:red, th:th, dur:dur, key:key, redMaxX:redMax, start:0, done:false};
    el.__a=o; mounts.push(o); render(o,0);
  }

  function render(o, p, flicker){
    var g=o.grid, chars=g.chars, cols=g.colors, C=g.cols, R=g.rows, th=o.th, w='', r='';
    for(var y=0;y<R;y++){
      var cs=chars[y]||'', ks=cols[y]||'', base=y*C, wl='', rl='';
      for(var x=0;x<C;x++){
        var ch=cs[x];
        if(ch===' '||ch===undefined){ wl+=' '; rl+=' '; continue; }
        var t=th[base+x], isR=(ks[x]==='r') && ((x/C)<=o.redMaxX);
        if(p>=t){
          var out=ch;
          if(flicker && Math.random()<0.012) out=NOISE[(Math.random()*NOISE.length)|0];
          if(isR){ rl+=out; wl+=' '; } else { wl+=out; rl+=' '; }
        } else if(p>=t-0.11){
          var gg=NOISE[(Math.random()*NOISE.length)|0];
          if(isR){ rl+=gg; wl+=' '; } else { wl+=gg; rl+=' '; }
        } else { wl+=' '; rl+=' '; }
      }
      w+=wl+'\n'; r+=rl+'\n';
    }
    o.white.textContent=w; o.red.textContent=r;
  }

  var lastFlick=0, raf=0;
  function loop(now){
    for(var i=0;i<mounts.length;i++){
      var o=mounts[i];
      if(!o.start) o.start=now;
      if(!o.done){
        var p=(now-o.start)/o.dur;
        if(p>=1){ p=1; o.done=true; render(o,1); if(o.key==='emblem') revNeedle(o); }
        else render(o,p);
      }
    }
    if(now-lastFlick>150 && !reduced){
      lastFlick=now;
      for(var j=0;j<mounts.length;j++){ if(mounts[j].done) render(mounts[j],1,true); }
    }
    raf=requestAnimationFrame(loop);
  }
  function revNeedle(o){
    if(reduced || !o.red.animate) return;
    try{ o.red.animate(
      [{transform:'rotate(-9deg)'},{transform:'rotate(3.5deg)'},{transform:'rotate(0deg)'}],
      {duration:900, easing:'cubic-bezier(.2,.85,.15,1)'}); }catch(e){}
  }
  function replayAll(){ for(var i=0;i<mounts.length;i++){ mounts[i].start=0; mounts[i].done=false; } }

  if(!DATA){ document.getElementById('asc-emblem').textContent='[ ascii-data.js failed to load ]'; }
  else { document.querySelectorAll('[data-ascii]').forEach(initAscii); }
  raf=requestAnimationFrame(loop);

  var ov=document.getElementById('workOverlay');
  document.getElementById('workBtn').addEventListener('click', function(){ ov.classList.add('open'); });
  document.getElementById('workClose').addEventListener('click', function(){ ov.classList.remove('open'); });
  ov.addEventListener('click', function(e){ if(e.target===ov) ov.classList.remove('open'); });
})();
</script>
</body>
</html>
