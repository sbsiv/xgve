<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:#000;}
  .wrap{display:flex;align-items:center;gap:34px;padding:44px 52px;background:#000;
    font-family:var(--font-mono, "IBM Plex Mono", monospace);}
  .emblem{height:104px;width:auto;display:block;flex:none;}
  .rule{width:1px;height:96px;background:#26262a;flex:none;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .wordmark{width:236px;height:auto;display:block;}
  .tagline{font-size:12.5px;letter-spacing:0.2em;text-transform:uppercase;color:#83848c;}
  .tagline .x{color:#fff;}
  .note{margin-top:2px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#43444a;}
</style>
</head>
<body>
  <div class="wrap">
    <img class="emblem" src="../assets/icon/xgve-icon-transparent.png" alt="XGVE emblem">
    <div class="rule"></div>
    <div class="stack">
      <img class="wordmark" src="../assets/wordmark/xgve-wordmark-redx.png" alt="XGVE">
      <div class="tagline"><span class="x">e</span>Xperimental <span class="x">G</span>ames &amp; <span class="x">V</span>ibe <span class="x">E</span>ngineering</div>
      <div class="note">Good taste, engineered.</div>
    </div>
  </div>
</body>
</html>
