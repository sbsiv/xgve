<!-- @dsCard group="Motifs" viewport="700x210" name="Graphic language" subtitle="Broken ring · diagonal cut · pixel trail · technical rule" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-canvas); color: var(--content-primary); }
  .row { display: flex; gap: 16px; }
  .cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .stage { width: 100%; height: 108px; display: flex; align-items: center; justify-content: center;
           position: relative; overflow: hidden; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--content-muted);
       letter-spacing: var(--tracking-wide); text-align: center; }

  /* Broken progress ring */
  .ring { width: 90px; height: 90px; border-radius: 50%;
          background: conic-gradient(var(--accent) 0deg 248deg, transparent 248deg 292deg,
                      var(--border-default) 292deg 360deg);
          -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 9px));
          mask: radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 9px)); }

  /* Diagonal cut panel */
  .cut { width: 96px; height: 90px; background: var(--surface-raised);
         border: var(--border-thin) solid var(--border-strong);
         clip-path: polygon(0 0, 100% 0, 100% 62%, 66% 100%, 0 100%); position: relative; }
  .cut::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
                background: var(--accent);
                clip-path: polygon(0 100%, 0 60%, 66% 100%); }

  /* Red pixel trail */
  .trail { width: 120px; height: 90px; position: relative; }
  .trail i { position: absolute; background: var(--accent); }
  .p0 { width: 20px; height: 20px; left: 4px;  bottom: 8px; }
  .p1 { width: 15px; height: 15px; left: 34px; bottom: 26px; }
  .p2 { width: 11px; height: 11px; left: 60px; bottom: 42px; }
  .p3 { width: 8px;  height: 8px;  left: 82px; bottom: 56px; }
  .p4 { width: 5px;  height: 5px;  left: 100px; bottom: 68px; }

  /* Technical rule */
  .rulewrap { width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
  .rule { height: 1px; background: var(--border-default); position: relative; }
  .rule::before { content: ""; position: absolute; left: 0; top: -3px; width: 24px; height: 7px; background: var(--accent); }
  .rulelab { font-family: var(--font-mono); font-size: 9px; letter-spacing: var(--tracking-widest);
             text-transform: uppercase; color: var(--content-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="stage"><div class="ring"></div></div><span class="t">Broken ring</span></div>
    <div class="cell"><div class="stage"><div class="cut"></div></div><span class="t">Diagonal cut</span></div>
    <div class="cell"><div class="stage"><div class="trail"><i class="p0"></i><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div></div><span class="t">Pixel trail</span></div>
    <div class="cell"><div class="stage"><div class="rulewrap"><span class="rulelab">System</span><div class="rule"></div><span class="rulelab">Online</span><div class="rule"></div></div></div><span class="t">Technical rule</span></div>
  </div>
</body>
</html>
