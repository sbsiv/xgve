<!-- @dsCard group="Brand" viewport="700x220" name="Wordmark & tagline" subtitle="Custom artwork — never re-typed in a font" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 32px; background: var(--surface-canvas); color: var(--content-primary);
         display: flex; flex-direction: column; gap: 22px; justify-content: center; }
  .a img { height: 58px; width: auto; display: block; }
  .b img { height: 74px; width: auto; display: block; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-wide);
         color: var(--content-muted); margin-top: 8px; }
  .warn { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-wide);
          color: var(--accent); }
</style>
</head>
<body>
  <div class="a"><img src="../assets/wordmark/xgve-wordmark-transparent.png" alt="XGVE wordmark">
    <div class="cap">Wordmark only · white with red X accent · V stays white</div></div>
  <div class="b"><img src="../assets/wordmark/xgve-wordmark-tagline-transparent.png" alt="XGVE with tagline">
    <div class="cap">With tagline · eXperimental generative venture engine</div></div>
  <div class="warn">DO NOT — re-type in Space Grotesk or any font; it is artwork</div>
</body>
</html>
