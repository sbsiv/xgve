<!-- @dsCard group="Colors" viewport="700x170" name="Functional status (use sparingly)" subtitle="Data/state UIs only — never competes with red" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-canvas);
         font-family: var(--font-body); color: var(--content-primary); }
  .row { display: flex; gap: 12px; margin-bottom: 14px; }
  .sw { flex: 1; display: flex; align-items: center; gap: 10px;
        border: var(--border-thin) solid var(--border-subtle); padding: 12px; }
  .dot { width: 12px; height: 12px; border-radius: var(--radius-pill); flex: none; }
  .sw .n { font-size: var(--text-sm); font-weight: var(--weight-medium); }
  .sw .t { font-family: var(--font-mono); font-size: 10px; color: var(--content-muted); display: block; }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--content-muted);
          letter-spacing: var(--tracking-wide); }
  .note b { color: var(--accent); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><span class="dot" style="background:var(--xg-fn-positive)"></span>
      <span><span class="n">Positive</span><span class="t">--xg-fn-positive</span></span></div>
    <div class="sw"><span class="dot" style="background:var(--xg-fn-warning)"></span>
      <span><span class="n">Warning</span><span class="t">--xg-fn-warning</span></span></div>
    <div class="sw"><span class="dot" style="background:var(--xg-fn-info)"></span>
      <span><span class="n">Info</span><span class="t">--xg-fn-info</span></span></div>
    <div class="sw"><span class="dot" style="background:var(--xg-fn-critical)"></span>
      <span><span class="n">Critical</span><span class="t">--xg-fn-critical = red</span></span></div>
  </div>
  <div class="note">Reach for these <b>only</b> in dense data / status interfaces. Brand surfaces stay black · white · red.</div>
</body>
</html>
