<!-- @dsCard group="Colors" viewport="700x180" name="Signal Red — states & tint" subtitle="Scarce by design. One red per view." -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-canvas);
         font-family: var(--font-body); color: var(--content-primary); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 84px; }
  .lab { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-wide);
         color: var(--content-secondary); }
  .lab b { display: block; color: var(--content-primary); font-weight: var(--weight-semibold);
           font-family: var(--font-body); font-size: var(--text-sm); letter-spacing: 0; margin-bottom: 2px; }
  .tint { border: var(--border-thin) solid var(--accent-border);
          display: flex; align-items: center; justify-content: center;
          font-family: var(--font-mono); font-size: 11px; color: var(--accent);
          letter-spacing: var(--tracking-widest); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--xg-red-bright);"></div>
      <span class="lab"><b>Hover</b>#FF2036 · --xg-red-bright</span></div>
    <div class="sw"><div class="chip" style="background: var(--xg-red);"></div>
      <span class="lab"><b>Base</b>#E6021B · --xg-red</span></div>
    <div class="sw"><div class="chip" style="background: var(--xg-red-deep);"></div>
      <span class="lab"><b>Press</b>#B00015 · --xg-red-deep</span></div>
    <div class="sw"><div class="chip" style="background: var(--xg-red-dim);"></div>
      <span class="lab"><b>Dim fill</b>#6E000E · --xg-red-dim</span></div>
    <div class="sw"><div class="chip tint" style="background: var(--accent-surface);">tint</div>
      <span class="lab"><b>Surface</b>red / .12 alpha</span></div>
  </div>
</body>
</html>
