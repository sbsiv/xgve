<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Headlines & hero. Tight tracking, engineered." -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-canvas); color: var(--content-primary); }
  .big { font-family: var(--font-display); font-weight: var(--weight-bold);
         font-size: 68px; line-height: var(--leading-tight); letter-spacing: var(--tracking-tight);
         margin: 0 0 6px; }
  .big em { color: var(--accent); font-style: normal; }
  .sub { font-family: var(--font-display); font-weight: var(--weight-medium);
         font-size: var(--text-xl); color: var(--content-secondary);
         letter-spacing: var(--tracking-tight); }
  .foot { margin-top: 18px; font-family: var(--font-mono); font-size: 11px;
          color: var(--content-muted); letter-spacing: var(--tracking-wide); }
</style>
</head>
<body>
  <p class="big">Build the improb<em>a</em>ble.</p>
  <p class="sub">Space Grotesk · 400 / 500 / 600 / 700</p>
  <p class="foot">--font-display · --weight-bold · --tracking-tight</p>
</body>
</html>
