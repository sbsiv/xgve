<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing scale" subtitle="4px rhythm + 2px hairline step" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-canvas); color: var(--content-primary);
         font-family: var(--font-mono); }
  .r { display: flex; align-items: center; gap: 14px; margin-bottom: 7px; }
  .bar { height: 12px; background: var(--accent); }
  .lab { font-size: 11px; color: var(--content-secondary); letter-spacing: var(--tracking-wide);
         min-width: 150px; }
  .lab b { color: var(--content-primary); }
</style>
</head>
<body>
  <div class="r"><span class="lab"><b>2</b> · --space-1</span><div class="bar" style="width:2px"></div></div>
  <div class="r"><span class="lab"><b>4</b> · --space-2</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="lab"><b>8</b> · --space-3</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="lab"><b>12</b> · --space-4</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="lab"><b>16</b> · --space-5</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="lab"><b>24</b> · --space-7</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="lab"><b>32</b> · --space-8</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="lab"><b>48</b> · --space-10</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="lab"><b>64</b> · --space-11</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="lab"><b>96</b> · --space-13</span><div class="bar" style="width:96px"></div></div>
  <div class="r"><span class="lab"><b>128</b> · --space-14</span><div class="bar" style="width:128px"></div></div>
</body>
</html>
