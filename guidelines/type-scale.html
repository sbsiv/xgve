<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="2xs 11 → 6xl 88. Display sizes lead." -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-canvas); color: var(--content-primary);
         font-family: var(--font-display); }
  .r { display: flex; align-items: baseline; gap: 16px; margin-bottom: 6px; white-space: nowrap; }
  .r .s { font-weight: var(--weight-semibold); letter-spacing: var(--tracking-tight); line-height: 1.1; }
  .r .m { font-family: var(--font-mono); font-size: 10px; color: var(--content-muted);
          letter-spacing: var(--tracking-wide); }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:var(--text-6xl)">Xg</span><span class="m">6xl · 88</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-4xl)">Build fast</span><span class="m">4xl · 48</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-3xl)">Ship anyway</span><span class="m">3xl · 36</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-2xl)">Section heading</span><span class="m">2xl · 28</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-xl)">Subheading</span><span class="m">xl · 22</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-lg);font-family:var(--font-body)">Lead paragraph</span><span class="m">lg · 18</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-base);font-family:var(--font-body);font-weight:400">Body base — the default reading size</span><span class="m">base · 15</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-sm);font-family:var(--font-body);font-weight:400">Small / secondary</span><span class="m">sm · 13</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-xs);font-family:var(--font-mono);font-weight:400">CAPTION · MONO</span><span class="m">xs · 12</span></div>
</body>
</html>
