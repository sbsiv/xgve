<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-canvas); color: var(--content-primary);
         font-family: var(--font-body); }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: var(--tracking-widest);
         text-transform: uppercase; color: var(--content-muted); margin: 0 0 12px; }
  .grp { margin-bottom: 24px; }
  .row { display: flex; gap: 26px; align-items: center; flex-wrap: wrap; }
  .toasts { display: flex; flex-direction: column; gap: 12px; max-width: 400px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ProgressRing, Dialog, Toast, Tooltip, Button, IconButton } = window.XGVEDesignSystem_c9ef21;
  const S = (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
      strokeLinecap="round" strokeLinejoin="round">{p}</svg>;
  const Search = () => <S><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></S>;

  function Demo() {
    const [open, setOpen] = React.useState(false);
    return (
      <React.Fragment>
        <div className="grp">
          <p className="lab">ProgressRing — the broken-ring gauge</p>
          <div className="row">
            <ProgressRing value={72} label="Build" />
            <ProgressRing value={38} size={80} thickness={7} label="CPU" />
            <ProgressRing indeterminate size={80} label="Sync" />
          </div>
        </div>
        <div className="grp">
          <p className="lab">Dialog · Tooltip</p>
          <div className="row">
            <Button variant="primary" onClick={() => setOpen(true)}>Open dialog</Button>
            <Tooltip label="Search" shortcut="⌘K">
              <IconButton label="Search" variant="outline"><Search/></IconButton>
            </Tooltip>
            <Tooltip label="Redeploy build" placement="bottom">
              <Button variant="secondary">Hover me</Button>
            </Tooltip>
          </div>
        </div>
        <div className="grp">
          <p className="lab">Toasts</p>
          <div className="toasts">
            <Toast variant="signal" title="Build shipped" message="#1180 is live on 4 nodes." onClose={() => {}} />
            <Toast variant="warning" title="Node degraded" message="EU-West latency 240ms"
                   actionLabel="Investigate" onAction={() => {}} onClose={() => {}} />
          </div>
        </div>
        <Dialog open={open} onClose={() => setOpen(false)}
          eyebrow="Confirm" title="Delete node Aurora?"
          description="This tears down the node and its build cache. It cannot be undone."
          footer={<React.Fragment>
            <Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button>
            <Button variant="danger" onClick={() => setOpen(false)}>Delete node</Button>
          </React.Fragment>}>
          <p>Any in-flight builds on this node will be cancelled immediately.</p>
        </Dialog>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
